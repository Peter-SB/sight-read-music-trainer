<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sax Practice Trainer</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: https://github.com/rafgraph/spa-github-pages
      // This redirects the 404 back to index.html with the path encoded in the query string.
      var pathSegmentsToKeep = 1; // keep "/sight-read-music-trainer"

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
